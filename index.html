<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ülgen Bilgin | Projeler</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-dark: #0f0f0f;
    --accent: #00d4ff;
    --glass: rgba(255, 255, 255, 0.05);
    --glass-border: rgba(255, 255, 255, 0.1);
    --glow: rgba(0, 212, 255, 0.4);
  }

  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('background.png') no-repeat center center fixed;
    background-size: cover;
    color: #fff;
  }

  .main-layout {
    display: flex;
    height: 100vh;
    width: 100vw;
  }

  /* --- Sidebar / Navigation --- */
  nav {
    width: 260px;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(20px);
    border-right: 1px solid var(--glass-border);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px 20px;
    z-index: 100;
    transition: 0.3s;
    box-sizing: border-box;
  }

  .nav-top-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .nav-logo {
    width: 80px;
    border-radius: 12px;
    margin-bottom: 10px;
    box-shadow: 0 0 20px var(--glow);
  }

  .nav-brand {
    font-weight: bold;
    font-size: 1.2rem;
    margin-bottom: 40px;
    letter-spacing: 2px;
    color: var(--accent);
    text-shadow: 0 0 10px var(--glow);
  }

  .nav-links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .nav-item {
    padding: 15px 20px;
    border-radius: 10px;
    color: #ccc;
    font-weight: 500;
    transition: all 0.3s ease;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    background: transparent;
    border: none;
    text-align: left;
    width: 100%;
  }

  .nav-icon { width: 20px; height: 20px; object-fit: contain; }

  .nav-item.active {
    box-shadow: inset 4px 0 0 var(--accent), 0 0 20px rgba(0, 212, 255, 0.2);
    background: rgba(0, 212, 255, 0.1);
    color: #fff;
  }

  /* --- Footer Section: Language and Socials --- */
  .nav-footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding-top: 25px;
  }

  .lang-switch {
    display: flex;
    gap: 10px;
    width: 100%;
    justify-content: center;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--glass-border);
  }

  .lang-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    transition: 0.3s;
    padding: 0;
  }

  .lang-btn img {
    width: 32px;
    height: auto;
    opacity: 0.5;
    transition: 0.3s;
  }

  .lang-btn.active img, .lang-btn:hover img {
    opacity: 1;
    filter: drop-shadow(0 0 5px var(--accent));
  }

  .social-footer {
    display: flex;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap;
  }

  .social-link img {
    width: 22px;
    height: 22px;
    opacity: 0.5;
    transition: 0.3s;
  }

  .social-link:hover img {
    opacity: 1;
    transform: translateY(-3px);
    filter: drop-shadow(0 0 8px var(--accent));
  }

  /* --- Content Area --- */
  .content-wrapper { 
    flex: 1; 
    padding: 40px; 
    overflow-y: auto; 
    box-sizing: border-box;
  }
  
  .section { display: none; animation: fadeIn 0.5s ease forwards; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* --- Homepage Section --- */
  .home-container {
    max-width: 700px;
    margin: 60px auto 0 auto;
    text-align: center;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 50px 40px 40px 40px;
    backdrop-filter: blur(15px);
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
    box-sizing: border-box;
  }

  .home-container h1 {
    font-size: 2.8rem;
    margin-top: 0;
    color: #fff;
    letter-spacing: 1px;
  }

  .home-container h1 span {
    color: var(--accent);
    text-shadow: 0 0 15px var(--glow);
  }

  .home-container p {
    font-size: 1.2rem;
    color: #ccc;
    line-height: 1.8;
    margin-bottom: 35px;
  }

  .home-cta-group {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 45px;
  }

  .home-btn {
    display: inline-block;
    padding: 14px 35px;
    border-radius: 30px;
    font-weight: bold;
    text-decoration: none;
    transition: all 0.3s ease;
    font-size: 1rem;
    cursor: pointer;
  }

  .home-btn.primary {
    background: var(--accent);
    color: #000;
    border: 2px solid var(--accent);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
  }

  .home-btn.primary:hover {
    box-shadow: 0 0 35px var(--accent);
    transform: translateY(-3px);
  }

  .home-btn.secondary {
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
  }

  .home-btn.secondary:hover {
    background: rgba(0, 212, 255, 0.1);
    box-shadow: 0 0 25px rgba(0, 212, 255, 0.2);
    transform: translateY(-3px);
  }

  /* --- Large Horizontal Social Links Grid --- */
  .home-social-grid {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    margin-top: 20px;
    padding-top: 35px;
    border-top: 1px solid var(--glass-border);
  }

  .home-social-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: #ccc;
    transition: all 0.3s ease;
    cursor: pointer;
  }

  .home-social-item .icon-wrapper {
    width: 65px;
    height: 65px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--glass-border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 10px;
    transition: all 0.3s ease;
  }

  .home-social-item img {
    width: 30px;
    height: 30px;
    object-fit: contain;
    opacity: 0.6;
    transition: all 0.3s ease;
  }

  .home-social-item span {
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.3s ease;
  }

  .home-social-item:hover {
    color: var(--accent);
    transform: translateY(-4px);
  }

  .home-social-item:hover .icon-wrapper {
    background: rgba(0, 212, 255, 0.1);
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--glow);
  }

  .home-social-item:hover img {
    opacity: 1;
    filter: drop-shadow(0 0 5px var(--accent));
  }

  .home-social-item:hover span {
    text-shadow: 0 0 8px var(--glow);
  }

  /* --- Portfolio Section Headers & Descriptions --- */
  .portfolio-header-block {
    margin-bottom: 30px;
  }

  .portfolio-desc {
    font-size: 1.1rem;
    color: #ccc;
    line-height: 1.6;
    margin-top: 15px;
    margin-bottom: 5px;
    min-height: 40px;
    animation: fadeIn 0.4s ease forwards;
  }

  .portfolio-controls { display: flex; gap: 15px; margin-bottom: 25px; }
  .filter-btn {
    background: var(--glass); border: 1px solid var(--glass-border); color: white;
    padding: 10px 25px; border-radius: 25px; cursor: pointer; transition: 0.3s;
    font-weight: 500;
  }
  .filter-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 20px var(--accent); border-color: var(--accent); }

  .grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
    gap: 25px; 
  }
  .card { 
    background: var(--glass); 
    border-radius: 15px; 
    border: 1px solid var(--glass-border); 
    overflow: hidden; 
    transition: 0.4s; 
  }
  
  /* --- Smart Video Thumbnail Boxes --- */
  .video-box { 
    position: relative; 
    padding-bottom: 56.25%; 
    height: 0; 
    background: #000; 
    display: block;
    overflow: hidden;
    text-decoration: none;
    cursor: pointer;
  }
  .video-box .thumbnail {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    object-fit: cover;
    transition: transform 0.3s ease;
  }
  .video-box:hover .thumbnail {
    transform: scale(1.05);
  }
  .play-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 55px;
    height: 55px;
    background: rgba(0, 0, 0, 0.75);
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    z-index: 2;
  }
  .play-button::after {
    content: '';
    display: block;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 9px 0 9px 15px;
    border-color: transparent transparent transparent #fff;
    margin-left: 3px;
    transition: border-color 0.3s ease;
  }
  .video-box:hover .play-button {
    background: var(--accent);
    box-shadow: 0 0 20px var(--accent);
    transform: translate(-50%, -50%) scale(1.1);
  }
  .video-box:hover .play-button::after {
    border-color: transparent transparent transparent #000;
  }

  .info { padding: 20px; }
  .info h3 { margin: 0 0 10px 0; font-size: 1.25rem; color: #fff; }
  .info p { margin: 0; font-size: 0.9rem; color: #ccc; }

  /* --- Video Modal Popup --- */
  .video-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(10px);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-content {
    position: relative;
    width: 90%;
    max-width: 960px;
    aspect-ratio: 16/9;
    background: #000;
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
    overflow: hidden;
  }
  .modal-content iframe {
    width: 100%;
    height: 100%;
    border: none;
  }
  .close-modal {
    position: absolute;
    top: -45px;
    right: 0;
    background: transparent;
    border: none;
    color: #fff;
    font-size: 2rem;
    cursor: pointer;
    transition: 0.3s;
  }
  .close-modal:hover {
    color: var(--accent);
    text-shadow: 0 0 10px var(--accent);
  }

  /* --- Contact Area Section --- */
  .contact-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 50px 40px;
    text-align: center;
    max-width: 500px;
    margin: 60px auto;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(15px);
    box-sizing: border-box;
  }

  .contact-card h2 {
    margin-top: 0;
    font-size: 2.2rem;
    color: var(--accent);
    text-shadow: 0 0 15px var(--glow);
    letter-spacing: 1px;
  }

  .contact-card p {
    color: #ccc;
    margin-bottom: 35px;
    font-size: 1.1rem;
    line-height: 1.6;
  }

  .contact-btn {
    display: inline-block;
    background: transparent;
    border: 2px solid var(--accent);
    color: var(--accent);
    padding: 14px 40px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    text-decoration: none;
    transition: all 0.3s ease;
    box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
    font-size: 1rem;
    letter-spacing: 0.5px;
  }

  .contact-btn:hover {
    background: var(--accent);
    color: #000;
    box-shadow: 0 0 30px var(--accent);
    transform: translateY(-3px);
  }

  /* --- Desktop Specific Overflow Containment --- */
  @media (min-width: 769px) {
    body { overflow: hidden; }
  }

  /* --- Mobile Responsive Layout Optimization --- */
  @media (max-width: 768px) {
    body { 
      overflow-y: auto !important; 
      overflow-x: hidden;
    }
    
    .main-layout { 
      flex-direction: column; 
      height: auto; 
      width: 100vw;
    }
    
    nav { 
      width: 100%; 
      height: auto; 
      padding: 15px; 
      border-right: none; 
      border-bottom: 1px solid var(--glass-border);
      position: sticky; 
      top: 0; 
      flex-direction: column; 
      align-items: center;
    }
    
    .nav-logo, .nav-brand { display: none; }
    
    .nav-links { 
      flex-direction: row; 
      justify-content: center; 
      flex-wrap: wrap; 
      gap: 8px; 
      width: 100%;
    }
    
    .nav-item { 
      width: auto; 
      padding: 10px 15px; 
      font-size: 0.85rem; 
    }
    
    .nav-footer {
      width: 100%;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      padding-top: 15px;
      margin-top: 10px;
      border-top: 1px solid var(--glass-border);
      gap: 10px;
    }
    
    .lang-switch {
      border-bottom: none;
      padding-bottom: 0;
      width: auto;
    }
    
    .content-wrapper { 
      padding: 24px 16px; 
      overflow-y: visible; 
      height: auto;
      width: 100%;
    }
    
    .grid { 
      grid-template-columns: 1fr; 
      gap: 20px;
    }
    
    .close-modal { 
      top: 10px; 
      right: 10px; 
      background: rgba(0,0,0,0.5); 
      border-radius: 50%; 
      width: 40px; 
      height: 40px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      z-index: 1001; 
    }
    
    .contact-card { 
      margin: 20px auto; 
      padding: 35px 20px; 
      width: 100%;
    }
    
    .home-container { 
      margin: 20px auto; 
      padding: 40px 20px; 
      width: 100%;
    }
    
    .home-container h1 { font-size: 2rem; }
    
    .home-cta-group { 
      flex-direction: column; 
      gap: 15px; 
      margin-bottom: 30px; 
    }
    
    .home-social-grid { 
      gap: 15px; 
      flex-wrap: wrap; 
      padding-top: 25px; 
    }
    
    .home-social-item .icon-wrapper { width: 50px; height: 50px; }
    
    .home-social-item img { width: 22px; height: 22px; }
    
    .home-social-item span { font-size: 0.75rem; }
  }
</style>
</head>
<body>

<div class="main-layout">
  <nav>
    <div class="nav-top-content">
      <img src="logo.png" alt="Ülgen" class="nav-logo">
      <div class="nav-brand">ÜLGEN</div>
      
      <div class="nav-links">
        <button id="navBtnHome" class="nav-item active" onclick="showSection('home', this)">
          <img src="home_icon.png" class="nav-icon" alt=""> 
          <span data-key="nav_home"></span>
        </button>
        <button id="navBtnPortfolio" class="nav-item" onclick="showSection('portfolio', this)">
          <img src="portfolio_icon.png" class="nav-icon" alt=""> 
          <span data-key="nav_portfolio"></span>
        </button>
        <button id="navBtnContact" class="nav-item" onclick="showSection('contact', this)">
          <img src="contact_icon.png" class="nav-icon" alt=""> 
          <span data-key="nav_contact"></span>
        </button>
      </div>
    </div>

    <div class="nav-footer">
      <div class="lang-switch">

        <button id="langBtnEn" class="lang-btn" onclick="changeLanguage('en', this)">
          <img src="en_icon.png" alt="EN">
        </button>
      </div>

      <div class="social-footer">
        <a href="https://www.linkedin.com/in/ulgenbilgin/" target="_blank" class="social-link"><img src="linkedin.png" alt="Linkedin"></a>
        <a href="https://x.com/CalestialKhan/" target="_blank" class="social-link"><img src="twitter.png" alt="X"></a>
        <a href="https://www.youtube.com/@CalestialKhan" target="_blank" class="social-link"><img src="youtube.png" alt="Youtube"></a>
        <a href="https://store.steampowered.com/curator/46128060-Calestial-Games/" target="_blank" class="social-link"><img src="steam.png" alt="Steam"></a>
      </div>
    </div>
  </nav>

  <main class="content-wrapper">
    <section id="home" class="section active">
      <div class="home-container">
        <h1 data-key="home_title"></h1>
        <p data-key="home_desc"></p>
        
        <div class="home-cta-group">
          <button class="home-btn primary" onclick="navigateToSection('portfolio')" data-key="home_cta_port"></button>
          <button class="home-btn secondary" onclick="navigateToSection('contact')" data-key="home_cta_contact"></button>
        </div>

        <div class="home-social-grid">
          <a href="https://www.linkedin.com/in/ulgenbilgin/" target="_blank" class="home-social-item">
            <div class="icon-wrapper">
              <img src="linkedin.png" alt="LinkedIn">
            </div>
            <span>LinkedIn</span>
          </a>
          <a href="https://x.com/CalestialKhan/" target="_blank" class="home-social-item">
            <div class="icon-wrapper">
              <img src="twitter.png" alt="X">
            </div>
            <span>Twitter</span>
          </a>
          <a href="https://www.youtube.com/@CalestialKhan" target="_blank" class="home-social-item">
            <div class="icon-wrapper">
              <img src="youtube.png" alt="YouTube">
            </div>
            <span>YouTube</span>
          </a>
          <a href="https://store.steampowered.com/curator/46128060-Calestial-Games/" target="_blank" class="home-social-item">
            <div class="icon-wrapper">
              <img src="steam.png" alt="Steam">
            </div>
            <span>Steam</span>
          </a>
        </div>

      </div>
    </section>

    <section id="portfolio" class="section">
      <div class="portfolio-header-block">
        <h2 data-key="port_title"></h2>
        <p id="portfolioDesc" class="portfolio-desc" data-key="desc_all"></p>
      </div>

      <div class="portfolio-controls">
        <button class="filter-btn active" onclick="filterGrid('all', this)" data-key="btn_all"></button>
        <button class="filter-btn" onclick="filterGrid('pc', this)" data-key="btn_pc"></button>
        <button class="filter-btn" onclick="filterGrid('hc', this)" data-key="btn_mobile"></button>
      </div>
      
      <div class="grid" id="projectGrid">
        
        <div class="card" data-type="pc">
          <div onclick="openVideo('Z4G48QD6Tfo')" class="video-box">

          </div>
          <div class="info">
            <h3>City Builder & Clicker</h3>

          </div>
        </div>

        <div class="card" data-type="pc">
          <div onclick="openVideo('3szWPaqaZIA')" class="video-box">

            <div class="play-button"></div>

          <div class="info">

        <div class="card" data-type="pc">

          </div>
        </div>

        <div class="card" data-type="hc">
          <div onclick="openVideo('W4UQO2fEhbg')" class="video-box">

          <div class="info">
            <h3>Fighter Crowd</h3>

          </div>
        </div>

        <div class="card" data-type="hc">
          <div onclick="openVideo('uMFjRhRh2pw')" class="video-box">

            <div class="play-button"></div>
          </div>
          <div class="info">
            <h3>Bulb Man</h3>
            <p data-key="desc_bulbman"></p>
          </div>
        </div>

        <div class="card" data-type="hc">
          <div onclick="openVideo('V5ti62fl0fM')" class="video-box">
            <img src="https://img.youtube.com/vi/V5ti62fl0fM/maxresdefault.jpg" alt="Tire Monster" class="thumbnail">
            <div class="play-button"></div>
          </div>
          <div class="info">
            <h3>Tire Monster</h3>
            <p data-key="desc_tiremonster"></p>
          </div>
        </div>

        <div class="card" data-type="hc">
          <div onclick="openVideo('EKDStDlbUwc')" class="video-box">
            <img src="https://img.youtube.com/vi/EKDStDlbUwc/maxresdefault.jpg" alt="Gasoline Rush" class="thumbnail">
            <div class="play-button"></div>
          </div>
          <div class="info">

            <p data-key="desc_gasolinerush"></p>

<script>
  // Global translation dictionary containing localized strings
  const translations = {
    tr: {
      nav_home: "Anasayfa", nav_portfolio: "Projeler", nav_contact: "İletişim",
      home_title: "Merhaba, Ben <span>Ülgen</span>", home_desc: "Unity ve C# kullanarak gelişmiş oyun mekanikleri, araçlar ve sistemler geliştiriyorum.",
      home_cta_port: "Projelerimi Gör", home_cta_contact: "Bana Ulaş",
      port_title: "Projeler", 
      btn_all: "Hepsi", btn_pc: "PC", btn_mobile: "Mobil",
      desc_all: "Şu anda PC odaklı çalışıyorum ama geçmişte mobil için oyunlar da ürettim. Yaptığım işlerin bir kısmını buradan inceleyebilirsiniz",
      desc_pc: "Pc için geliştirdiğim oyunlar, mekanik testlerim ve sistemlerim.",
      desc_mobile: "Uzun zamandır mobil üzerine çalışmıyorum, buradaki işler oldukça eski. Ama göz atmaktan çekinmeyin.",
      desc_blocktopia: "Tıklayarak kaynak kazandığımız bir şehir yönetimi oyunu.",
      desc_fps: "FPS oyunu mekanik testi.",
      desc_spaceNomad: "Yukarıdan bakışlı (Top-down) bir aksiyon/nişancı oyunu.",
      desc_fighter: "3 boyutlu bir Snake VS Block denemesi",
      desc_bulbman: "Etraftaki prizlerden şarj olup milleti şokladığımız bir hyper-casual oyun.",
      desc_tiremonster: "Büyüyen ve engelleri ezen bir tekerlek canavarını yönettiğimiz bir mobil oyun.",
      desc_gasolinerush: "Hız ve yakıt yönetimini temel alan dinamik bir hyper-casual koşucu oyunu.",
      desc_collecta: "Çevredeki nesneleri toplayarak büyümeye ve hedeflere ulaşmaya dayalı arcade mekaniği.",
      desc_eatandspit: "Nesneleri yutup fırlatarak rakipleri veya engelleri alt ettiğimiz bir konsept.",
      desc_smashthebodies: "Adam tutup başkalarına vurarak parçaladığımız bir oyun.",
      desc_barbiearmy: "Karakterleri toplayıp kendi ordumuzu kurarak ilerlediğimiz bir runner / arcade oyunu.",
      desc_visashooter: "Para toplayıp peşimize takipçi taktığımız bir oyun.",
      desc_rockwoodgold: "Kaynak toplama, üretim ve karakter geliştirme döngüsüne sahip mobil arcade idle projesi.",
      contact_title: "İletişim", contact_desc: "Bana e-posta yoluyla ulaşabilirsiniz.", btn_mail: "E-posta Gönder"
    },
    en: {
      nav_home: "Home", nav_portfolio: "Projects", nav_contact: "Contact",
      home_title: "Hello, I'm <span>Ülgen</span>", home_desc: "Building advanced game mechanics, tools, and systems using Unity and C#.",
      home_cta_port: "View My Work", home_cta_contact: "Contact Me",
      port_title: "My Projects", 
      btn_all: "All", btn_pc: "PC", btn_mobile: "Mobile",
      desc_all: "I am currently focusing on PC development, but I have also created mobile games in the past. You can explore some of my work here.",
      desc_pc: "PC games, mechanic tests, and systems that I have developed or am currently developing.",
      desc_mobile: "I haven't worked on mobile for a long time; the projects here are quite old. But feel free to check them out.",
      desc_blocktopia: "A city management game where we gather resources by clicking.",
      desc_fps: "An FPS game mechanic test.",
      desc_spaceNomad: "A top-down action shooter game.",
      desc_fighter: "A 3D interpretation of a Snake VS Block concept.",
      desc_bulbman: "A hyper-casual game where we charge up from nearby outlets and shock others.",
      desc_tiremonster: "A mobile game where we manage a growing tire monster that crushes obstacles.",
      desc_gasolinerush: "A dynamic hyper-casual runner game based on speed and fuel management.",
      desc_collecta: "An arcade mechanic based on collecting nearby objects to grow and reach goals.",
      desc_eatandspit: "A concept where we swallow objects and spit them out to defeat opponents or obstacles.",
      desc_smashthebodies: "A game where we grab characters and smash them into others to break them apart.",
      desc_barbiearmy: "A runner / arcade game where we gather characters to build our own army and progress.",
      desc_visashooter: "A game where we collect money and attract followers to tail us.",
      desc_rockwoodgold: "A mobile arcade idle project featuring a resource gathering, crafting, and character progression loop.",
      contact_title: "Contact", contact_desc: "Feel free to reach out anytime.", btn_mail: "Send Email"
    }
  };

  // Variable tracking the currently active language code ('tr' or 'en')
  let currentLang = 'tr';

  // Updates UI elements matching a data-key attribute based on the designated language
  function changeLanguage(lang, btn) {
    currentLang = lang;
    document.querySelectorAll('[data-key]').forEach(el => {
      const key = el.getAttribute('data-key');
      if (translations[lang][key]) {
        // Preserves internal HTML structures (e.g. <span> nodes) for specific titles
        if (key === 'home_title') {
          el.innerHTML = translations[lang][key];
        } else {
          el.innerText = translations[lang][key];
        }
      }
    });
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // Switches display state between primary semantic sections
  function showSection(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // Links homepage call-to-action buttons directly into the navigation context
  function navigateToSection(id) {
    let targetBtn;
    if (id === 'portfolio') targetBtn = document.getElementById('navBtnPortfolio');
    if (id === 'contact') targetBtn = document.getElementById('navBtnContact');
    
    if (targetBtn) {
      showSection(id, targetBtn);
    }
  }

  // Handles filtering the portfolio grid view and dynamically updates category descriptions
  function filterGrid(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    // Select description element and update content based on active language and filter criteria
    const descEl = document.getElementById('portfolioDesc');
    if (type === 'all') {
      descEl.innerText = translations[currentLang]['desc_all'];
      descEl.setAttribute('data-key', 'desc_all');
    } else if (type === 'pc') {
      descEl.innerText = translations[currentLang]['desc_pc'];
      descEl.setAttribute('data-key', 'desc_pc');
    } else if (type === 'hc') {
      descEl.innerText = translations[currentLang]['desc_mobile'];
      descEl.setAttribute('data-key', 'desc_mobile');
    }

    // Toggle card visibilities within the project grid layout
    document.querySelectorAll('.card').forEach(c => {
      if (type === 'all' || c.dataset.type === type) {
        c.style.display = 'block';
      } else {
        c.style.display = 'none';
      }
    });
  }

  /* --- Video Lightbox Modal Controllers --- */
  function openVideo(videoId) {
    const modal = document.getElementById('videoModal');
    const player = document.getElementById('modalPlayer');
    player.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
    modal.style.display = 'flex';
  }

  function closeVideo() {
    const modal = document.getElementById('videoModal');
    const player = document.getElementById('modalPlayer');
    modal.style.display = 'none';
    player.src = '';
  }

  window.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      closeVideo();
    }
  });

  /* --- Automated Client-Side Locale Assessment --- */
  window.addEventListener('DOMContentLoaded', () => {
    const browserLang = navigator.language || navigator.userLanguage;
    
    if (!browserLang.startsWith('tr')) {
      // If browser is not Turkish, default to English
      const enBtn = document.getElementById('langBtnEn');
      if (enBtn) {
        changeLanguage('en', enBtn);
      }
    } else {
      // Force initial render for Turkish default so empty DOM elements fill up properly
      const trBtn = document.getElementById('langBtnTr');
      if (trBtn) {
        changeLanguage('tr', trBtn);
      }
    }
  });
</script>
